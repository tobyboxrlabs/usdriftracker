name: Commit Comment Smoke Test

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Post a commit comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          body=$(cat <<'EOF'
          ✅ GitHub Actions can write commit comments.

          Commit: $SHA
          Trigger: push to main
          Next: replace this comment body with Cursor Security Whitehat output.
          EOF
          )
          # Create a commit comment
          curl -sS -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/commits/${SHA}/comments" \
            -d "$(jq -n --arg body "$body" '{body: $body}')"
