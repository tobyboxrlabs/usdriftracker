name: Security Whitehat (commit review)

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  security-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Maximum 10 minutes for the entire job

    steps:
      - name: Run Security Whitehat Cloud Agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          SECURITY_PERSONA: |
            You are a Security Whitehat reviewer.

            Role:
            - You are a read-only security reviewer.
            - You never modify code.
            - You never suggest refactors unless they reduce security risk.

            Scope:
            - Frontend (React / TS)
            - Backend (Node / API routes)
            - Dependencies
            - Configuration
            - Secrets & env handling

            Inputs:
            - Repository name
            - Commit SHA
            - Diff or file snapshot
            - Review only files changed in the commit and their immediate imports.
              Do not scan the full repository unless explicitly required.

            Tasks:
            1. Identify security risks introduced or exposed in this revision
            2. Classify each finding by severity: Critical / High / Medium / Low
            3. Reference exact files and line numbers
            4. Note whether this issue existed before or is newly introduced

            Output Rules:
            - Output Markdown only
            - Write results as a single review comment for the current commit
            - Do not repeat previously reported issues unless status changed
            - Findings must include a plausible exploit path. If none exists, do not report.

            Output Format:
            Each finding must follow this format:

            ### [SEVERITY] Short title
            - Commit: <sha>
            - File: path/to/file.ts
            - Lines: 123–145
            - Issue: description
            - Risk: why it matters
            - Recommendation: what to change
            - Status: New | Existing | Resolved

            Forbidden:
            - Do not fix code
            - Do not run tests
            - Do not suggest stylistic changes
            - Do not create files, commits, branches, or pull requests.

        run: |
          set -euo pipefail
          PERSONA_HASH=$(echo "$SECURITY_PERSONA" | sha256sum | cut -d' ' -f1)
          echo "Security Whitehat persona hash: $PERSONA_HASH"

          # Create secure temporary file and ensure cleanup
          TMPFILE=$(mktemp)
          trap 'rm -f "$TMPFILE"' EXIT INT TERM

          echo "Starting Security Whitehat review for commit $SHA"

          # Create agent run using injected Security Whitehat persona
          CREATE_RESPONSE=$(curl -sS \
            -u "${CURSOR_API_KEY}:" \
            -X POST https://api.cursor.com/v0/agents \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg persona "$SECURITY_PERSONA" \
              --arg repo "$REPO" \
              '{
                prompt: { text: $persona },
                source: {
                  repository: ("https://github.com/" + $repo),
                  ref: "main"
                },
                target: {
                  autoBranch: false,
                  autoCreatePr: false
                }
              }'
            )")
          
          # Log only status, not full response (to avoid exposing sensitive data)
          CREATE_STATUS=$(echo "$CREATE_RESPONSE" | jq -r '.status // "no-status"')
          echo "Agent creation status: $CREATE_STATUS"
          
          RUN_ID=$(echo "$CREATE_RESPONSE" | jq -r '.id // empty')
          CREATE_ERROR=$(echo "$CREATE_RESPONSE" | jq -r '.error // empty')
          
          if [ -n "$CREATE_ERROR" ]; then
            echo "Error creating agent: $CREATE_ERROR"
            exit 1
          fi

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "Failed to start Security Whitehat agent"
            exit 1
          fi

          echo "Run ID: $RUN_ID"

          # Wait for agent to finish (max 5 minutes = 60 iterations × 5 seconds)
          MAX_ITERATIONS=60
          for i in $(seq 1 $MAX_ITERATIONS); do
            # Fetch status using secure temporary file
            HTTP_CODE=$(curl -sS -o "$TMPFILE" -w "%{http_code}" \
              -u "${CURSOR_API_KEY}:" \
              https://api.cursor.com/v0/agents/${RUN_ID} 2>&1) || HTTP_CODE="000"
            
            if [ "$HTTP_CODE" != "200" ]; then
              echo "[$i/$MAX_ITERATIONS] HTTP $HTTP_CODE when fetching status, retrying..."
              if [ $i -lt $MAX_ITERATIONS ]; then
                sleep 5
                continue
              else
                echo "Max retries reached for status check (last HTTP code: $HTTP_CODE)"
                exit 1
              fi
            fi
            
            RESPONSE=$(cat "$TMPFILE")
            STATUS=$(echo "$RESPONSE" | jq -r '.status // "UNKNOWN"')
            ERROR=$(echo "$RESPONSE" | jq -r '.error // empty')

            echo "[$i/$MAX_ITERATIONS] Status: $STATUS"
            
            if [ -n "$ERROR" ]; then
              echo "Error from agent: $ERROR"
            fi

            # Handle terminal states
            case "$STATUS" in
              "FINISHED")
                echo "Agent finished successfully"
                break
                ;;
              "FAILED"|"ERROR"|"CANCELLED")
                echo "Agent failed with status: $STATUS"
                if [ -n "$ERROR" ]; then
                  echo "Error details: $ERROR"
                fi
                exit 1
                ;;
              "CREATING"|"RUNNING"|"PENDING")
                # Continue waiting
                ;;
              *)
                echo "Unknown status: $STATUS, continuing to wait..."
                ;;
            esac

            sleep 5
          done

          # Final status check
          FINAL_RESPONSE=$(curl -sS \
            -u "${CURSOR_API_KEY}:" \
            https://api.cursor.com/v0/agents/${RUN_ID})
          FINAL_STATUS=$(echo "$FINAL_RESPONSE" | jq -r '.status // "UNKNOWN"')
          FINAL_ERROR=$(echo "$FINAL_RESPONSE" | jq -r '.error // empty')
          
          if [ "$FINAL_STATUS" != "FINISHED" ]; then
            echo "Agent did not finish in time. Final status: $FINAL_STATUS"
            if [ -n "$FINAL_ERROR" ]; then
              echo "Error: $FINAL_ERROR"
            fi
            exit 1
          fi

          # Get conversation messages
          CONVERSATION=$(curl -sS \
            -u "${CURSOR_API_KEY}:" \
            https://api.cursor.com/v0/agents/${RUN_ID}/conversation)
          
          BODY=$(echo "$CONVERSATION" | jq -r '[.messages[] | select(.type=="assistant_message") | .text] | last')
          MESSAGE_COUNT=$(echo "$CONVERSATION" | jq -r '[.messages[] | select(.type=="assistant_message")] | length')

          if [ -z "$BODY" ] || [ "$BODY" = "null" ]; then
            echo "No security review output received (found $MESSAGE_COUNT assistant messages)"
            exit 1
          fi
          
          echo "Security review output received (${#BODY} characters)"

          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${REPO}/commits/${SHA}/comments \
            -d "$(jq -n --arg body "$BODY" '{body: $body}')"

          echo "Security Whitehat review posted to commit"
